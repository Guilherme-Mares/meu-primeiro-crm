<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Meu Primeiro CRM</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: var(--color-bg);
        }
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: var(--spacing-5);
            background-color: var(--color-surface);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            text-align: center;
        }
        .login-container h2 {
            margin-bottom: var(--spacing-4);
            color: var(--color-primary);
        }
        .login-container form {
            text-align: left;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>CRM<span style="color: #64748b;">.PRO</span></h2>
        <form id="form-login">
            <div class="form-group">
                <label for="login-email">E-mail</label>
                <input type="email" id="login-email" class="form-control" placeholder="Seu e-mail" required>
            </div>
            <div class="form-group">
                <label for="login-senha">Senha</label>
                <input type="password" id="login-senha" class="form-control" placeholder="Sua senha" required>
            </div>
            <div id="login-erro" class="text-danger hidden" style="margin-bottom: var(--spacing-3);"></div>
            <button type="submit" class="btn btn-primary btn-block">Entrar</button>
        </form>
    </div>

    <script src="/js/authFront.js"></script>
</body>
</html>
