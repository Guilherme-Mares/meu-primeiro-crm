<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Primeiro CRM</title>
    <!-- Chart.js para o Dashboard -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>CRM<span class="text-primary">.PRO</span></h2>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="#" class="active" id="nav-leads"><i class="icon">👥</i> Leads</a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <button id="btn-logout" class="btn btn-outline">Sair</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <h1>Painel de Leads</h1>
                <div class="user-info">
                    <span id="user-name">Usuário</span>
                </div>
            </header>

            <section id="content-area" class="content">
                
                <!-- Dashboard Resumo (Issue 9) -->
                <div id="dashboard-resumo" class="dashboard-cards" style="display: none;">
                    <div class="kpi-card card">
                        <div class="kpi-title">Total de Leads</div>
                        <div class="kpi-value" id="kpi-total">0</div>
                    </div>
                    <div class="kpi-card card">
                        <div class="kpi-title">Negócios Fechados</div>
                        <div class="kpi-value text-success" id="kpi-fechados">0</div>
                    </div>
                    <div class="kpi-card card">
                        <div class="kpi-title">Taxa de Conversão</div>
                        <div class="kpi-value" id="kpi-conversao">0%</div>
                    </div>
                    <div class="kpi-card card kpi-chart-card">
                        <div class="kpi-title">Funil de Vendas</div>
                        <div style="position: relative; height: 120px; width: 100%; display: flex; justify-content: center;">
                            <canvas id="funnelChart"></canvas>
                        </div>
                    </div>
                </div>

                <!-- Tabela de Clientes -->
                <div class="card">
                    <div class="card-header">
                        <h2>Meus Clientes</h2>
                        <button class="btn btn-primary" id="btn-novo-lead">+ Novo Lead</button>
                    </div>
                    <div class="card-body" style="padding: 0;">
                        <table class="crm-table">
                            <thead>
                                <tr>
                                    <th>Nome</th>
                                    <th>E-mail</th>
                                    <th>Telefone</th>
                                    <th>Status</th>
                                    <th>Data Criação</th>
                                    <th style="text-align: right;">Ações</th>
                                </tr>
                            </thead>
                            <tbody id="leads-table-body">
                                <!-- JS vai injetar os leads aqui -->
                                <tr>
                                    <td colspan="6" style="text-align: center; padding: 2rem;">Carregando leads...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Modal Form (Novo / Editar Lead) -->
    <div id="lead-modal" class="modal hidden">
        <div class="modal-content card" style="max-width: 500px;">
            <div class="card-header" style="border: none; padding: 0 0 1rem 0;">
                <h2 id="modal-titulo">Novo Lead</h2>
                <button class="btn btn-outline" id="btn-fechar-modal" style="padding: 0.2rem 0.5rem;">✕</button>
            </div>
            <form id="form-lead">
                <input type="hidden" id="lead-id">
                <div class="form-group">
                    <label for="lead-nome">Nome do Cliente</label>
                    <input type="text" id="lead-nome" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="lead-email">E-mail</label>
                    <input type="email" id="lead-email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="lead-telefone">Telefone</label>
                    <input type="text" id="lead-telefone" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="lead-status">Fase no Funil</label>
                    <select id="lead-status" class="form-control" required>
                        <option value="Novo">Novo</option>
                        <option value="Contatado">Contatado</option>
                        <option value="Qualificado">Qualificado</option>
                        <option value="Proposta">Proposta</option>
                        <option value="Fechado">Fechado</option>
                        <option value="Perdido">Perdido</option>
                    </select>
                </div>
                <div id="lead-erro" class="text-danger hidden" style="margin-bottom: var(--spacing-3);"></div>
                <button type="submit" class="btn btn-primary btn-block" id="btn-salvar-lead">Salvar Lead</button>
            </form>
        </div>
    </div>

    <!-- Drawer Lateral (Mestre-Detalhe de Interações) -->
    <div id="interacoes-overlay" class="drawer-overlay hidden"></div>
    <div id="interacoes-drawer" class="drawer">
        <div class="drawer-header">
            <div>
                <h2 id="drawer-titulo" style="margin-bottom: 0.2rem;">Histórico do Lead</h2>
                <small id="drawer-subtitulo" class="text-muted">Acompanhe as interações</small>
            </div>
            <button class="btn btn-outline" id="btn-fechar-drawer" style="padding: 0.2rem 0.5rem; height: 32px;">✕</button>
        </div>
        
        <div class="drawer-content">
            <div id="timeline-interacoes" class="timeline">
                <!-- JS vai injetar os cards de interação aqui -->
                <p class="text-muted" style="text-align: center; margin-top: 2rem;">Carregando...</p>
            </div>
        </div>

        <div class="drawer-footer">
            <form id="form-interacao">
                <div class="form-group">
                    <label for="interacao-tipo">Tipo de Contato</label>
                    <select id="interacao-tipo" class="form-control" required style="margin-bottom: 0.5rem;">
                        <option value="Ligação">📞 Ligação</option>
                        <option value="E-mail">✉️ E-mail</option>
                        <option value="WhatsApp">💬 WhatsApp</option>
                        <option value="Reunião">🤝 Reunião</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="interacao-descricao">Descrição (O que aconteceu?)</label>
                    <textarea id="interacao-descricao" class="form-control" rows="3" required placeholder="Ex: Cliente pediu orçamento..."></textarea>
                </div>
                <div id="interacao-erro" class="text-danger hidden" style="margin-bottom: var(--spacing-2); font-size: 0.85rem;"></div>
                <button type="submit" class="btn btn-primary btn-block" id="btn-salvar-interacao">Registrar Interação</button>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/js/app.js"></script>
    <script src="/js/dashboardView.js"></script>
    <script src="/js/leadsView.js"></script>
    <script src="/js/interacoesView.js"></script>
</body>
</html>
